services:

  es-ror:
    build:
      context: .
      dockerfile: images/es/Dockerfile
      args:
        ROR_ES_REPO: $ROR_ES_REPO
        ES_VERSION: $ES_VERSION
        ROR_ES_VERSION: $ROR_ES_VERSION
    ports:
      - "9200:9200"
      - "5005:5005"
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      - ES_VERSION=$ES_VERSION
      - cluster.name=elk-ror
      - node.name=elk-ror-es-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      # for a sake of debugging and profiling
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 -Dcom.readonlyrest.settings.loading.attempts.count=0 -Dcom.readonlyrest.settings.loading.delay=0s -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9010 -Dcom.sun.management.jmxremote.local.only=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.rmi.port=9010 -Djava.rmi.server.hostname=127.0.0.1"
      # for a sake of ROR settings marked as "<-- related to ECK environment -->"
      - KIBANA_SERVICE_ACCOUNT_TOKEN=UNUSED
      - INTERNAL_PROBE_PASS=UNUSED
      - INTERNAL_USR_PASS=UNUSED
    healthcheck:
      test: ["CMD-SHELL", "curl -fksS --connect-timeout 3 --max-time 5 --retry 2 -u kibana:kibana https://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 60s
      retries: 30
      start_period: 60s
    networks:
      - es-ror-network
    ulimits:
      memlock:
        soft: -1
        hard: -1

  kbn-ror:
    restart: always # To restart Kibana during kibana config changes e2e tests on signint. Without it, Container is stopped and not restarted.
    build:
      context: .
      dockerfile: images/kbn/Dockerfile
      args:
        ROR_KBN_REPO: $ROR_KBN_REPO
        KBN_VERSION: $KBN_VERSION
        ROR_KBN_VERSION: $ROR_KBN_VERSION
        ROR_ACTIVATION_KEY: $ROR_ACTIVATION_KEY
    depends_on:
      es-ror:
        condition: service_healthy
    mem_limit: 1g
    memswap_limit: 1g
    deploy:
      mode: replicated
      replicas: 2
    environment:
      ES_API_URL: https://es-ror:9200
      NODE_OPTIONS: "--max-old-space-size=768"
    healthcheck:
      test: [ "CMD", "curl", "-k", "--fail", "-u", "kibana:kibana", "https://localhost:5601/api/status" ]
      interval: 10s
      timeout: 10s
      retries: 30
      # Two Kibana replicas + ES + APM boot concurrently. On CPU-small CI agents
      # (e.g. the 2-vCPU Azure host) a replica needs >60s to reach /api/status, so
      # `docker compose up --wait` was tearing the stack down before tests ran.
      # start_period only extends the startup grace; it's free on a fast boot.
      start_period: 180s
    networks:
      - es-ror-network
    ulimits:
      memlock:
        soft: -1
        hard: -1

  kbn-proxy:
    build:
      context: .
      dockerfile: images/kbn/Proxy-Dockerfile
    depends_on:
      kbn-ror:
        condition: service_healthy
    ports:
      - "5601:443"
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: [ "CMD", "curl", "-k", "--fail", "-u", "kibana:kibana", "https://localhost:443/api/status" ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - es-ror-network

networks:
  es-ror-network:
    driver: bridge
